name: "dotenv Seeder"
description: "Seeds environment variables into a env file using JSON input."
author: "scrlkx <me@scrlkx.com>"

inputs:
  mode:
    description: >
      How the target file is seeded. "copy-example" (default) copies the example
      file to the target before applying variables (the example file must exist).
      "only-create" writes/updates the target file directly without requiring or
      copying an example file.
    required: false
    default: "copy-example"
  example:
    description: "The example environment file to copy from (e.g., .env.example)"
    required: false
    default: ".env.example"
  target:
    description: "The target environment file to update (e.g., .env)"
    required: false
    default: ".env"
  variables:
    description: "JSON object of variables to replace in the environment file"
    required: true

runs:
  using: "node24"
  main: "dist/index.js"
